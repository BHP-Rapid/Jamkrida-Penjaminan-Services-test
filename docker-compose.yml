version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jjkt-penjaminan-test
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9116}:80"
    volumes:
      - app-storage:/var/www/storage
    env_file:
      - .env
    environment:
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis-container
      REDIS_PORT: 6379
      REDIS_QUEUE: default
      HORIZON_BULK_MULTIGUNA_WORKERS: 2
      HORIZON_RABBITMQ_EVENT_WORKERS: 1
    networks:
      - laravel

  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jjkt-penjaminan-horizon-test
    restart: unless-stopped
    user: "www-data"
    command: ["php", "artisan", "horizon"]
    volumes:
      - app-storage:/var/www/storage
    env_file:
      - .env
    environment:
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis-container
      REDIS_PORT: 6379
      REDIS_QUEUE: default
      HORIZON_BULK_MULTIGUNA_WORKERS: 2
      HORIZON_RABBITMQ_EVENT_WORKERS: 1
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  app-storage:
